<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta Firstname="viewport" content="width=device-width, initial-scale=1" />
    <title>Contacts App - Alpine.js</title>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
      .contacts-table tbody tr:nth-of-type(even) {
        background: #f9fafb; /* Gray 50 */
      }

      .contacts-table tr:not(.isEditing) .isEditing-visible {
        display: none;
      }
      .contacts-table tr:not(.isEditing) .isEditing-hidden {
        display: block;
      }
      .contacts-table tr.isEditing .isEditing-visible {
        display: block;
      }
      .contacts-table tr.isEditing .isEditing-hidden {
        display: none;
      }
    </style>
  </head>
  <body class="bg-gray-100 container mx-auto py-8">
    <div
      id="app"
      class="w-full bg-white rounded-lg shadow-lg flex flex-wrap overflow-hidden"
      x-data="contactsApp()"
      x-init="watcher(), sortById();"
    >
      <!-- Aside gauche pour le formulaire -->
      <aside class="w-1/3 bg-gray-200 p-6 pb-12">
        <form action="" @submit.prevent="addContact()">
        <h2 class="text-xl font-bold mb-4">Add a Contact</h2>
        <div class="mb-4">
          <label class="block text-gray-700">Firstname</label>
          <input
            type="text"
            class="mt-1 block w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
            placeholder="Alex"
            required
            x-model="newContact.firstname"
          />
        </div>
        <div class="mb-4">
          <label class="block text-gray-700">Lastname</label>
          <input
            type="text"
            class="mt-1 block w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
            placeholder="Doe"
            required
            x-model="newContact.lastname"
          />
        </div>
        <div class="mb-4">
          <label class="block text-gray-700">Email</label>
          <input
            type="email"
            class="mt-1 block w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
            placeholder="alex.doe@gmail.com"
            required
            x-model="newContact.email"
          />
        </div>
        <button
          type="submit"
          class="w-full bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md"
        >
          Add
        </button>
        </form>
      </aside>

      <!-- Section droite pour la liste des contacts -->
      <section class="w-2/3 p-6">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-bold mb-4">Contacts List</h2>
          <p class="text-gray-600 mb-4">
            Contacts Count : <span class="font-bold" x-text="contactCounter()"></span>
          </p>
        </div>

        <!-- Filtre de recherche -->
        <div class="mb-4">
          <input
            type="text"
            class="mt-1 block w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
            placeholder="Search a contact"
            x-model="search"
          />
        </div>

        <!-- Liste des contacts triée et filtrée -->
        <table class="table-auto w-full contacts-table">
          <thead>
            <tr class="bg-gray-200">
              <th class="text-left p-4 rounded-tl-lg" >
                <a href="#" @click="sort('firstname')" >Firstname</a>
              </th>
              <th class="text-left p-4"><a href="#" @click="sort('lastname')" >Lastname</a></th>
              <th class="text-left p-4">
                <a href="#" @click="sort('email')" >Email</a>
              </th>
              <th class="text-right p-4 rounded-tr-lg">Actions</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="contact in filteredContacts" :key="contact.id">
              <tr class="contact-row" :class="{ 'isEditing': contact.isEditing }">
                <td class="p-4">
                  <span class="isEditing-hidden" x-text="contact.firstname"></span>
                  <input
                    type="text"
                    class="input-firstname isEditing-visible w-full mt-1 block w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                    x-model="contact.firstname"
                  />
                </td>
                <td class="p-4">
                  <span class="isEditing-hidden" x-text="contact.lastname"></span>
                  <input
                    type="text"
                    class="input-lastname isEditing-visible w-full mt-1 block w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                    x-model="contact.lastname"
                  />
                </td>
                <td class="p-4">
                  <span class="isEditing-hidden" x-text="contact.email"></span>
                  <input
                    type="text"
                    class="input-email isEditing-visible w-full mt-1 block w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                    x-model="contact.email"
                  />
                </td>
                <td class="p-4">
                  <div class="flex justify-end space-x-2">
                    <button
                      class="btn-check isEditing-visible bg-green-400 hover:bg-green-500 text-white font-bold py-2 px-4 rounded-md"
                      @click="saveContact(contact)"
                    >
                      <i class="fa-solid fa-check"></i>
                    </button>
                    <button
                      class="btn-edit isEditing-hidden bg-yellow-400 hover:bg-yellow-500 text-white font-bold py-2 px-4 rounded-md"
                      @click="editContact(contact)"
                    >
                      <i class="fa-solid fa-pen-to-square"></i>
                    </button>
                    <button
                      class="btn-delete isEditing-hidden bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-md"
                      @click="deleteContact(contact)"
                    >
                      <i class="fa-solid fa-trash"></i>
                    </button>
                  </div>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </section>

      
      <footer class="w-full bg-gray-500 text-white text-xs p-2" x-data="footerComponent">
       <div class="flex justify-center ">
         &copy; EAFC - <span class="mx-2" x-text="annee"></span> - Contacts App. All rights reserved.
       </div>
      </footer>
    </div>
    <script src="app.js"></script>
  </body>
</html>
